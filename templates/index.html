<!DOCTYPE html>
<html>
<head>
    <title>Digital Persona Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Digital Persona Chatbot</h2>

    <div class="input-section">
        <input id="url" placeholder="Enter LinkedIn URL">
        <button onclick="loadProfile()">Load</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input id="query" placeholder="Ask a question...">
        <button onclick="ask()">Send</button>
    </div>
</div>

<script>
async function loadProfile() {
    const url = document.getElementById("url").value;

    const res = await fetch("/load_profile", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({linkedin_url: url})
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
    } else {
        alert("Profile Loaded Successfully!");
    }
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function ask() {
    const query = document.getElementById("query").value;

    addMessage(query, "user");

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: query})
    });

    const data = await res.json();

    addMessage(data.answer, "bot");

    document.getElementById("query").value = "";
}
</script>

</body>
</html>
